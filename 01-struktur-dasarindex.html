# Struktur Dasar HTML

HTML memiliki beberapa bagian utama:

## 1. <!DOCTYPE html>

Menunjukkan bahwa dokumen menggunakan HTML5.

## 2. <html>

Elemen utama yang membungkus seluruh halaman.

## 3. <head>

Berisi informasi halaman seperti judul website.

## 4. <body>

Berisi seluruh konten yang ditampilkan pada halaman web.
