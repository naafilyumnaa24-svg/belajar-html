<!DOCTYPE html>
<!-- Menentukan bahwa dokumen menggunakan HTML5 -->

<html>
<!-- Elemen utama yang membungkus seluruh halaman HTML -->

<head>
    <!-- Bagian head berisi informasi tentang halaman -->

    <title>Struktur Dasar HTML</title>
    <!-- Judul yang tampil pada tab browser -->

</head>

<body>
    <!-- Bagian body berisi seluruh konten yang tampil di halaman web -->

    <h1>Belajar Struktur Dasar HTML</h1>
    <!-- Heading atau judul utama -->

    <p>
        Ini adalah contoh halaman HTML sederhana.
    </p>
    <!-- Paragraf -->

</body>

</html>
